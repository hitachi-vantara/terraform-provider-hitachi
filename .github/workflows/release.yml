# Terraform Provider release workflow.
name: Release

on:
  push:
    tags: ['v*']                  # NEW tag pushes
  release:
    types: [published]            # Publishing a GitHub Release
  workflow_dispatch:              # Manual run with a tag input
    inputs:
      tag:
        description: 'Tag to build (e.g., v2.1.1)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref || inputs.tag }}
  cancel-in-progress: false

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    # allow manual runs, release events, or tag-push; block random branch runs
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # when manual or release, checkout the right tag
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || (github.event_name == 'release' && github.event.release.tag_name) || '' }}

      # QUICK HIDE: temporarily exclude vssb sources from the build
      - name: Hide vssb sources
        shell: bash
        run: |
          set -euo pipefail
          if [ -d hitachi/storage/vssb ]; then
            # move tracked/untracked go files out of the way for this job
            find hitachi/storage/vssb -type f -name '*.go' -print > /tmp/vssb.list || true
            while read -r f; do
              [ -f "$f" ] && mv "$f" "$f.__skip"
            done < /tmp/vssb.list
          fi

      # (optional) schema check catches config typos fast
      - name: GoReleaser config check
        uses: goreleaser/goreleaser-action@v6
        with:
          args: check

      - uses: actions/setup-go@v4
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}

      # restore workspace so future jobs/reads see the original tree
      - name: Restore vssb sources
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/vssb.list ]; then
            while read -r f; do
              [ -f "$f.__skip" ] && mv "$f.__skip" "$f"
            done < /tmp/vssb.list
          fi
